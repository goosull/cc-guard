version: 1

deny:
  - pattern: "^rm -rf "
    reason: "Recursive force delete"
  - pattern: "^rm -r /"
    reason: "Recursive delete from root"
  - pattern: "git push --force"
    reason: "Force push"
  - pattern: "git push .* --force"
    reason: "Force push (flag after remote)"
  - pattern: "git reset --hard"
    reason: "Hard reset"
  - pattern: "^sudo "
    reason: "Elevated privileges"
  - pattern: "^chmod 777"
    reason: "World-writable permissions"
  - pattern: 'curl .* \| .*(bash|sh|zsh)'
    reason: "Download and execute"
  - pattern: 'wget .* -O- \| .*(bash|sh|zsh)'
    reason: "Download and execute"

  # File path rules (Read/Write/Edit/Glob/Grep)
  - pattern: "\\.env$"
    reason: "Environment file with secrets"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]
  - pattern: "(^|/)\\.env\\."
    reason: "Environment file variant (.env.local, .env.production)"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]
  - pattern: "/etc/passwd"
    reason: "System password file"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]
  - pattern: "/etc/shadow"
    reason: "System shadow file"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]
  - pattern: "\\.ssh/"
    reason: "SSH directory (keys, config)"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]
  - pattern: "\\.aws/credentials"
    reason: "AWS credentials"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]
  - pattern: "\\.gnupg/"
    reason: "GPG keys"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]
  - pattern: "(^|/)id_rsa($|\\.)"
    reason: "SSH private key"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]
  - pattern: "(^|/)id_ed25519($|\\.)"
    reason: "SSH private key (ed25519)"
    tools: ["Read", "Write", "Edit", "Glob", "Grep"]

allow: []
